name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v3
        with:
          file: ./Dockerfile
          context: ./
          push: false
          tags: msapi:latest

      - name: Build and run tests
        run: |
          docker build -f Dockerfile.tests -t msapi-tests:latest .
          mkdir -p testresults
          docker run --rm -v ${{ github.workspace }}/testresults:/testresults msapi-tests:latest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: testresults/
